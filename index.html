<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pencari Berita Bing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📰 Bing News Search</h1>
      <p>Cari berita terbaru dari Microsoft Bing</p>
    </header>
    
    <div class="search-box">
      <input type="text" id="keyword" placeholder="Contoh: teknologi, bola, bogor..." value="indonesia">
      <button onclick="cariBerita()">Cari Berita</button>
    </div>
    
    <div id="loading" style="display:none;">
      <div class="spinner"></div>
      <p>Sedang mencari berita...</p>
    </div>
    
    <div id="hasil"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
