<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-sky-50 min-h-screen p-4">
  <div class="max-w-md mx-auto space-y-4">
    
    <!-- CARD 1: ENGINE MSN NEWS -->
    <div class="bg-gradient-to-r from-pink-400 to-sky-400 p-0.5 rounded-3xl shadow-lg">
      <div class="bg-white rounded-3xl p-6">
        <div class="flex justify-between items-center mb-4">
          <p class="text-sky-600 font-semibold text-sm">ENGINE MSN NEWS</p>
          <span class="bg-sky-400 text-white text-xs font-bold px-3 py-1 rounded-full">ON</span>
        </div>
        
        <p class="text-pink-500 text-xs mb-1">TARGET KLIK</p>
        <input id="targetKlik" type="number" value="11" 
               class="w-full border-2 border-sky-200 focus:border-pink-400 rounded-xl p-3 text-center text-2xl font-bold text-gray-700 outline-none">
        
        <p class="text-center mt-4 text-4xl font-bold text-pink-500">
          <span id="currentKlik">00</span><span class="text-sky-400">/11</span>
        </p>
      </div>
    </div>

    <!-- TOMBOL START -->
    <button id="btnStart" class="w-full bg-sky-500 hover:bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg transition duration-300">
      START PENCARIAN
    </button>

    <!-- CARD 2: ENGINE BING SEARCH -->
    <div class="bg-gradient-to-r from-pink-400 to-sky-400 p-0.5 rounded-3xl shadow-lg">
      <div class="bg-white rounded-3xl p-6">
        <div class="flex justify-between items-center mb-4">
          <p class="text-sky-600 font-semibold text-sm">ENGINE BING SEARCH</p>
          <span class="bg-sky-400 text-white text-xs font-bold px-3 py-1 rounded-full">ON</span>
        </div>
        
        <p class="text-pink-500 text-xs mb-1">TARGET PENCARIAN</p>
        <input id="targetCari" type="number" value="20" 
               class="w-full border-2 border-sky-200 focus:border-pink-400 rounded-xl p-3 text-center text-2xl font-bold text-gray-700 outline-none mb-4">
        
        <div class="flex gap-3">
          <div class="flex-1">
            <p class="text-pink-500 text-xs mb-1">DURASI MIN</p>
            <input id="durasiMin" type="number" value="4" 
                   class="w-full border-2 border-sky-200 rounded-xl p-3 text-center text-xl font-bold text-gray-700 outline-none">
          </div>
          <div class="flex-1">
            <p class="text-pink-500 text-xs mb-1">DURASI MAX</p>
            <input id="durasiMax" type="number" value="8" 
                   class="w-full border-2 border-sky-200 rounded-xl p-3 text-center text-xl font-bold text-gray-700 outline-none">
          </div>
        </div>

        <p class="text-center mt-4 text-4xl font-bold text-pink-500">
          <span id="currentCari">00</span><span class="text-sky-400">/20</span>
        </p>
      </div>
    </div>

    <!-- SYSTEM ACTIVITY LOG -->
    <div class="bg-white rounded-2xl shadow-lg p-4">
      <p class="text-sky-600 font-semibold text-sm mb-2">SYSTEM ACTIVITY LOG</p>
      <div id="logBox" class="bg-gray-50 rounded-lg p-3 h-24 overflow-y-auto text-xs font-mono text-gray-600">
        <p>> SYSTEM INITIALIZED...</p>
        <p>> WAITING FOR INPUT...</p>
      </div>
    </div>

  </div>

  <script>
    const btnStart = document.getElementById('btnStart');
    const logBox = document.getElementById('logBox');
    
    function addLog(text) {
      const p = document.createElement('p');
      p.textContent = `> ${text}`;
      logBox.appendChild(p);
      logBox.scrollTop = logBox.scrollHeight;
    }

    btnStart.addEventListener('click', () => {
      addLog('TOMBOL START DITEKAN');
      addLog('FUNGSI OTOMASI TIDAK TERSEDIA');
      alert('Maaf, fungsi otomasi tidak bisa dijalankan karena melanggar TOS. Ini hanya template UI.');
    });
  </script>
</body>
</html>
