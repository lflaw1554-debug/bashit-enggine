<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BOT SEARCH + MSN</title>

<style>

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;

  background:
  linear-gradient(
    180deg,
    #ffc0cb,
    #ffffff,
    #1e3a8a
  );

  min-height:100vh;
}

.card{

  background:rgba(255,255,255,0.9);

  border-radius:20px;

  padding:20px;

  margin-bottom:20px;

  box-shadow:0 5px 15px rgba(0,0,0,0.15);

}

.title{

  font-size:24px;

  font-weight:bold;

  margin-bottom:20px;

}

label{

  display:block;

  margin-top:15px;

  margin-bottom:5px;

  font-weight:bold;

}

input,
textarea,
select{

  width:100%;

  padding:12px;

  border-radius:12px;

  border:1px solid #ccc;

  box-sizing:border-box;

}

textarea{

  height:140px;

  resize:none;

}

.row{

  display:flex;

  gap:15px;

}

.col{

  flex:1;

}

button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:14px;

  margin-top:15px;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;

}

.start{

  background:#2563eb;

  color:white;

}

.stop{

  background:#ef4444;

  color:white;

}

.log{

  height:250px;

  overflow-y:auto;

  background:#f3f4f6;

  padding:15px;

  border-radius:14px;

}

.progress{

  width:100%;

  height:12px;

  background:#ddd;

  border-radius:999px;

  overflow:hidden;

  margin-top:20px;

}

.progress-bar{

  width:0%;

  height:100%;

  background:#2563eb;

}

.counter{

  text-align:center;

  font-size:42px;

  font-weight:bold;

  margin-top:10px;

}

</style>
</head>
<body>

<!-- PANEL -->

<div class="card">

  <div class="title">
    BOT SEARCH + MSN
  </div>

  <label>STATUS SEARCH</label>

  <select id="searchStatus">
    <option>ON</option>
    <option>OFF</option>
  </select>

  <label>STATUS MSN</label>

  <select id="msnStatus">
    <option>ON</option>
    <option>OFF</option>
  </select>

  <div class="row">

    <div class="col">

      <label>JUMLAH SEARCH</label>

      <input
        type="number"
        id="searchTarget"
        value="3"
      />

    </div>

    <div class="col">

      <label>JUMLAH MSN</label>

      <input
        type="number"
        id="msnTarget"
        value="3"
      />

    </div>

  </div>

  <label>QUERY SEARCH</label>

  <textarea id="queryBox">
resep sate
abdullah
akhmad sodik
muhammad
kajian ust syafiq
alamussunah
laptop gaming
bunga bugenfil
tanaman yang beracun
tablet gaming
harga pajero
iphone 18
resep soto solo
tembok ratapan solo
prabowo
penyanyi terkenal jawa tengah
lawang sewu
wayang golek
oppo flip
ramayana
  </textarea>

  <button
    class="start"
    id="startBtn"
  >
    START BOT
  </button>

  <button
    class="stop"
    id="stopBtn"
  >
    STOP BOT
  </button>

</div>

<!-- STATUS -->

<div class="card">

  <div class="title">
    STATUS BOT
  </div>

  <div
    class="counter"
    id="counter"
  >
    00
  </div>

  <div class="progress">

    <div
      class="progress-bar"
      id="progressBar"
    ></div>

  </div>

</div>

<!-- LOG -->

<div class="card">

  <div class="title">
    ACTIVITY LOG
  </div>

  <div
    class="log"
    id="logBox"
  ></div>

</div>

<script>

// ======================
// DATA
// ======================

const msnLinks = [

  "https://www.msn.com/en-gb/travel/news/holidaymakers-told-to-arrive-four-hours-early-or-miss-flights-in-ees-chaos/ss-AA22lkS6?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/news/uknews/starmer-under-threat-over-trojan-horse-plot-to-smuggle-rival-back-to-replace-him/ar-AA22wWGb?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/entertainment/tv/badenoch-starmer-s-finished-and-polanski-s-a-joke-we-re-the-only-serious-choice/ar-AA22xk97?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/entertainment/news/king-charles-allegedly-slams-top-dog-authority-prince-william-told-to-know-his-place/ar-AA22wXBc?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/travel/news/coventry-airport-to-close-after-90-years-with-all-flights-scrapped-within-weeks/ar-AA22wiSz?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/money/other/aldi-and-lidl-rule-could-be-forced-to-change-as-uk-supermarkets-demand-crackdown/ar-AA22wfrY?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/news/uknews/starmer-s-last-ditch-plea-as-labour-braces-for-local-election-disaster/ar-AA22yUxG?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/travel/news/uk-staycation-demand-rises-as-airlines-told-they-can-cancel-flights/ss-AA22qn5L?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/lifestyle/family-relationships/report-queen-camilla-s-ex-husband-now-right-hand-man-to-princess-anne/ss-AA22i4Ea?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/foodanddrink/other/binman-s-rule-to-anyone-recycling-tins-and-jars-with-labels-left-on/ar-AA1X2DRu?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/money/other/britain-sleepwalking-towards-jobless-generation-warn-retailers/ar-AA22AqRQ?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/news/uknews/keir-starmer-to-use-eu-reset-to-stave-off-leadership-challenge/ar-AA22zFsq?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/money/technology/all-gmail-users-urged-to-check-one-setting-now-as-important-warning-issued/ar-AA22ueZv?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  "https://www.msn.com/en-gb/news/world/sky-news-halted-for-ultimate-humiliation-breaking-news-alert-for-donald-trump/ar-AA22vBj6?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",

];

let stopProcess = false;

// ======================
// LOG
// ======================

function writeLog(
  msg,
  color="#222"
){

  const log =
    document.getElementById("logBox");

  const time =
    new Date().toLocaleTimeString();

  log.innerHTML += `
    <div style="color:${color}">
      [${time}] ${msg}
    </div>
  `;

  log.scrollTop =
    log.scrollHeight;

}

// ======================
// SLEEP
// ======================

function sleep(ms){

  return new Promise(
    r => setTimeout(r,ms)
  );

}

// ======================
// PROGRESS
// ======================

async function runProgress(sec){

  const bar =
    document.getElementById(
      "progressBar"
    );

  bar.style.width = "0%";

  const total = sec * 10;

  for(let i=0;i<=total;i++){

    if(stopProcess) return;

    const percent =
      (i / total) * 100;

    bar.style.width =
      percent + "%";

    await sleep(100);

  }

  bar.style.width = "0%";

}

// ======================
// START BOT
// ======================

async function startBot(){

  stopProcess = false;

  writeLog(
    "BOT DIMULAI",
    "green"
  );

  const searchStatus =
    document.getElementById(
      "searchStatus"
    ).value;

  const msnStatus =
    document.getElementById(
      "msnStatus"
    ).value;

  const searchTarget =
    parseInt(
      document.getElementById(
        "searchTarget"
      ).value
    );

  const msnTarget =
    parseInt(
      document.getElementById(
        "msnTarget"
      ).value
    );

  const queries =
    document
      .getElementById("queryBox")
      .value
      .split("\n")
      .map(v => v.trim())
      .filter(v => v);

  const delay = 6;

  let done = 0;

  // ======================
  // SEARCH
  // ======================

  if(searchStatus === "ON"){

    for(
      let i=0;
      i<searchTarget;
      i++
    ){

      if(stopProcess) return;

      const q =
        queries[
          Math.floor(
            Math.random() *
            queries.length
          )
        ];

      writeLog(
        `MEMBUKA SEARCH: ${q}`,
        "#111"
      );

      const tab =
        window.open(
          "https://www.bing.com/search?q=" +
          encodeURIComponent(q),
          "_blank"
        );

      // tunggu
      await runProgress(delay);

      // tutup tab
      try{

        if(tab){
          tab.close();
        }

      }catch(e){}

      // kembali ke bot
      window.focus();

      writeLog(
        "KEMBALI KE MENU BOT",
        "blue"
      );

      done++;

      document.getElementById(
        "counter"
      ).innerText =
        done
        .toString()
        .padStart(2,"0");

      await sleep(1000);

    }

  }

  // ======================
  // MSN
  // ======================

  if(msnStatus === "ON"){

    for(
      let i=0;
      i<msnTarget;
      i++
    ){

      if(stopProcess) return;

      const link =
        msnLinks[
          Math.floor(
            Math.random() *
            msnLinks.length
          )
        ];

      writeLog(
        "MEMBUKA MSN NEWS",
        "#111"
      );

      const tab =
        window.open(
          link,
          "_blank"
        );

      // tunggu
      await runProgress(delay);

      // tutup tab
      try{

        if(tab){
          tab.close();
        }

      }catch(e){}

      // kembali ke bot
      window.focus();

      writeLog(
        "KEMBALI KE MENU BOT",
        "blue"
      );

      done++;

      document.getElementById(
        "counter"
      ).innerText =
        done
        .toString()
        .padStart(2,"0");

      await sleep(1000);

    }

  }

  // ======================
  // DONE
  // ======================

  writeLog(
    "BOT TELAH SELESAI DIGUNAKAN",
    "green"
  );

  alert(
    "BOT TELAH SELESAI DIGUNAKAN"
  );

}

// ======================
// START BUTTON
// ======================

document
  .getElementById("startBtn")
  .addEventListener(
    "click",
    startBot
  );

// ======================
// STOP BUTTON
// ======================

document
  .getElementById("stopBtn")
  .addEventListener(
    "click",
    () => {

      stopProcess = true;

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

    }
  );

</script>

</body>
</html>
