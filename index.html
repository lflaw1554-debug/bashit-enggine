<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search & MSN Viewer</title>

  <style>

    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    #startBtn {
      background: #22c55e;
      color: white;
    }

    #log {
      margin-top: 20px;
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      height: 300px;
      overflow: auto;
      font-size: 14px;
    }

  </style>
</head>
<body>

  <h1>SEARCH & MSN VIEWER</h1>

  <button id="startBtn">
    START
  </button>

  <div id="log"></div>

  <script>

    // ======================
    // DATA
    // ======================

    const customQueries = [
      "berita teknologi",
      "cuaca indonesia",
      "resep makanan",
      "wisata bali"
    ];

    const newsLinks = [
      "https://www.msn.com/en-gb/news",
      "https://www.msn.com/en-gb/travel",
      "https://www.msn.com/en-gb/money"
    ];

    // ======================
    // LOG
    // ======================

    function writeLog(msg) {

      const log =
        document.getElementById("log");

      const time =
        new Date().toLocaleTimeString();

      log.innerHTML += `
        <div>
          [${time}] ${msg}
        </div>
      `;

      log.scrollTop =
        log.scrollHeight;

    }

    // ======================
    // DELAY
    // ======================

    function sleep(ms) {

      return new Promise(
        r => setTimeout(r, ms)
      );

    }

    // ======================
    // MAIN
    // ======================

    async function startAutomation() {

      writeLog("MEMULAI...");

      // ======================
      // SEARCH
      // ======================

      for (const q of customQueries) {

        writeLog(
          `SEARCH: ${q}`
        );

        window.open(
          "https://www.bing.com/search?q=" +
          encodeURIComponent(q),
          "_blank"
        );

        await sleep(4000);

      }

      // ======================
      // MSN
      // ======================

      for (const link of newsLinks) {

        writeLog(
          `MEMBUKA MSN: ${link}`
        );

        window.open(
          link,
          "_blank"
        );

        await sleep(5000);

      }

      writeLog("SELESAI.");

    }

    // ======================
    // BUTTON
    // ======================

    document
      .getElementById("startBtn")
      .addEventListener(
        "click",
        startAutomation
      );

  </script>

</body>
</html>
