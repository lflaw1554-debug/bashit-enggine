<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Search Dashboard</title>

<style>

body {
  margin: 0;
  padding: 20px;
  background: #d9e8f2;
  font-family: Arial, sans-serif;
}

.card {
  background: #10f0a0;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.title {
  font-style: italic;
  letter-spacing: 4px;
  font-size: 18px;
  margin-bottom: 20px;
}

.input {
  width: 100%;
  height: 55px;
  border: none;
  border-radius: 8px;
  font-size: 24px;
  text-align: center;
  margin-top: 10px;
}

.row {
  display: flex;
  gap: 15px;
}

.col {
  flex: 1;
}

.counter {
  text-align: center;
  font-size: 50px;
  font-style: italic;
  margin-top: 20px;
}

.btn {
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #1696e8;
  color: white;
  padding: 16px;
</html>
