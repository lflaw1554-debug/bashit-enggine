<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUSHET EKONOMI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    :root {
      --bg: #000; --card: #0D0D0D; --card-border: #1A1A1A;
      --yellow: #FFD60A; --text: #E0E0E0; --text-dim: #888; --green: #00F5A0;
    }
    * {margin:0;padding:0;box-sizing:border-box}
    body {background:var(--bg);color:var(--text);font-family:'Orbitron',sans-serif;padding:20px 12px;min-height:100vh}
   .container {max-width:480px;margin:0 auto}
   .header {display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px}
   .title {font-weight:900;font-size:24px;letter-spacing:2px}
   .subtitle {font-size:10px;color:var(--yellow);letter-spacing:3px;margin-bottom:20px;padding:0 4px}
   .header-line {height:2px;background:var(--yellow);margin-bottom:20px}
   .card {background:var(--card);border:1px solid var(--card-border);border-radius:4px;padding:16px;margin-bottom:16px}
   .card-header {display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
   .card-title {font-weight:700;font-size:14px;letter-spacing:1px}
   .toggle {width:44px;height:24px;background:#2A2A2A;border-radius:12px;position:relative;cursor:pointer}
   .toggle.active {background:var(--yellow)}
   .toggle::after {content:'';position:absolute;width:18px;height:18px;background:#000;border-radius:50%;top:3px;left:3px;transition:0.3s}
   .toggle.active::after {left:23px}
   .input-group {border:1px solid var(--card-border);border-radius:4px;padding:12px;margin-bottom:12px}
   .input-label {font-size:10px;color:var(--yellow);letter-spacing:1px;margin-bottom:8px}
   .input-value {font-size:28px;font-weight:700;color:var(--text);background:transparent;border:none;width:100%;outline:none}
   .input-row {display:grid;grid-template-columns:1fr 1fr;gap:12px}
   .status {font-size:10px;color:var(--text-dim);letter-spacing:1px;margin:12px 0}
   .status.ready {color:var(--green)}
   .counter {text-align:center;font-weight:700;font-size:48px;margin:16px 0 8px}
   .counter span {color:var(--text-dim);font-size:32px}
   .btn-execute {width:100%;background:var(--yellow);color:#000;border:none;padding:18px;font-weight:900;font-size:14px;letter-spacing:2px;border-radius:4px;cursor:pointer;margin-top:8px}
   .btn-execute:disabled {background:#333;color:#666;cursor:not-allowed}
   .icon-btn {background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">BUSHET EKONOMI</div>
      <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
    </div>
    <div class="subtitle">MIDNIGHT PROTOCOL</div>
    <div class="header-line"></div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">ENGINE MSN</div>
        <div class="toggle" id="toggleMsn"></div>
      </div>
      <div class="input-group">
        <div class="input-label">TARGET BACA</div>
        <input type="number" class="input-value" id="targetMsn" value="10" min="1">
      </div>
      <div class="input-row">
        <div class="input-group">
          <div class="input-label">MIN DELAY</div>
          <input type="number" class="input-value" id="minDelayMsn" value="8" min="1">
        </div>
        <div class="input-group">
          <div class="input-label">MAX DELAY</div>
          <input type="number" class="input-value" id="maxDelayMsn" value="12" min="1">
        </div>
      </div>
      <div class="status ready" id="statusMsn">READY</div>
      <div class="counter"><span id="currentMsn">00</span> / <span id="totalMsn">10</span></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">ENGINE BING</div>
        <div class="toggle" id="toggleBing"></div>
      </div>
      <div class="input-group">
        <div class="input-label">TARGET CARI</div>
        <input type="number" class="input-value" id="targetBing" value="20" min="1">
      </div>
      <div class="input-row">
        <div class="input-group">
          <div class="input-label">MIN DELAY</div>
          <input type="number" class="input-value" id="minDelayBing" value="8" min="1">
        </div>
        <div class="input-group">
          <div class="input-label">MAX DELAY</div>
          <input type="number" class="input-value" id="maxDelayBing" value="12" min="1">
        </div>
      </div>
      <div class="status" id="statusBing">STANDBY</div>
      <div class="counter"><span id="currentBing">00</span> / <span id="totalBing">20</span></div>
    </div>

    <button class="btn-execute" id="executeBtn">EKSEKUSI OPERASI</button>
  </div>

    let msnCounter = 0;

    let bingTimeout = null;
