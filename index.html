<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEARCH + MSN DASHBOARD</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:
  linear-gradient(
    180deg,
    #ffc0cb,
    #ffffff,
    #1e3a8a
  );

  min-height:100vh;
}

.card{
  background:rgba(255,255,255,0.9);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:15px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-top:10px;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:15px;
}

.start{
  background:#2563eb;
  color:white;
}

.stop{
  background:#ef4444;
  color:white;
}

.log-box{
  height:220px;
  overflow:auto;
  background:#f5f5f5;
  border-radius:12px;
  padding:15px;
  font-size:14px;
}

.progress{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
  margin-top:20px;
}

.progress-bar{
  width:0%;
  height:100%;
  background:#2563eb;
}

.counter{
  text-align:center;
  font-size:42px;
  font-weight:bold;
}

</style>
</head>

<body class="p-4 flex justify-center">

<div class="w-full max-w-md">

  <!-- HEADER -->

  <div class="mb-6">

    <h1 class="text-3xl font-black">
      DEMO DASHBOARD
    </h1>

    <p class="text-sm text-gray-700">
      Search + MSN Viewer
    </p>

  </div>

  <!-- SEARCH -->

  <div class="card">

    <div class="title">
      SEARCH ENGINE
    </div>

    <label>Jumlah Search</label>

    <input
      type="number"
      id="search-target"
      value="3"
      class="input"
    >

    <label>Durasi Search (detik)</label>

    <input
      type="number"
      id="search-delay"
      value="6"
      class="input"
    >

    <label>Query Search</label>

    <textarea
      id="query-box"
      class="input"
      style="height:140px"
    >berita teknologi
wisata indonesia
cuaca hari ini
resep makanan
berita gaming</textarea>

  </div>

  <!-- MSN -->

  <div class="card">

    <div class="title">
      MSN NEWS
    </div>

    <label>Jumlah MSN</label>

    <input
      type="number"
      id="msn-target"
      value="2"
      class="input"
    >

  </div>

  <!-- BUTTON -->

  <button
    id="start-btn"
    class="btn start"
  >
    START BOT
  </button>

  <button
    id="stop-btn"
    class="btn stop"
  >
    STOP BOT
  </button>

  <!-- STATUS -->

  <div class="card">

    <div
      id="counter"
      class="counter"
    >
      00
    </div>

    <div class="progress">

      <div
        id="progress-bar"
        class="progress-bar"
      ></div>

    </div>

  </div>

  <!-- LOG -->

  <div class="card">

    <div class="title">
      ACTIVITY LOG
    </div>

    <div
      id="log-box"
      class="log-box"
    ></div>

  </div>

</div>

<script>

// ======================
// DATA
// ======================

const msnLinks = [

  "https://www.msn.com/en-gb/news",

  "https://www.msn.com/en-gb/travel",

  "https://www.msn.com/en-gb/money"

];

let stopProcess = false;

let botWindow = null;

// ======================
// LOG
// ======================

function writeLog(msg,color="#222"){

  const log =
    document.getElementById(
      "log-box"
    );

  const time =
    new Date().toLocaleTimeString();

  log.innerHTML += `
    <div style="color:${color}">
      [${time}] ${msg}
    </div>
  `;

  log.scrollTop =
    log.scrollHeight;

}

// ======================
// SLEEP
// ======================

function sleep(ms){

  return new Promise(
    r => setTimeout(r,ms)
  );

}

// ======================
// PROGRESS
// ======================

async function progress(sec){

  const bar =
    document.getElementById(
      "progress-bar"
    );

  for(let i=0;i<=100;i++){

    if(stopProcess) return;

    bar.style.width =
      i + "%";

    await sleep(sec * 10);

  }

  bar.style.width = "0%";

}

// ======================
// START BOT
// ======================

async function startBot(){

  stopProcess = false;

  writeLog(
    "BOT DIMULAI",
    "green"
  );

  const searchTarget =
    parseInt(
      document.getElementById(
        "search-target"
      ).value
    );

  const searchDelay =
    parseInt(
      document.getElementById(
        "search-delay"
      ).value
    );

  const msnTarget =
    parseInt(
      document.getElementById(
        "msn-target"
      ).value
    );

  const queries =
    document
      .getElementById(
        "query-box"
      )
      .value
      .split("\n")
      .map(v => v.trim())
      .filter(v => v);

  let done = 0;

  // ======================
  // BUKA POPUP SEKALI
  // ======================

  botWindow =
    window.open(
      "",
      "BOT_WINDOW"
    );

  if(!botWindow){

    alert(
      "Popup diblokir browser!"
    );

    return;

  }

  // ======================
  // SEARCH LOOP
  // ======================

  for(
    let i=0;
    i<searchTarget;
    i++
  ){

    if(stopProcess){

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

      return;

    }

    const q =
      queries[
        Math.floor(
          Math.random() *
          queries.length
        )
      ];

    writeLog(
      `SEARCH: ${q}`,
      "#111"
    );

    botWindow.location.href =
      "https://www.bing.com/search?q=" +
      encodeURIComponent(q);

    await progress(searchDelay);

    writeLog(
      "KEMBALI KE MENU BOT",
      "blue"
    );

    done++;

    document.getElementById(
      "counter"
    ).innerText =
      done
      .toString()
      .padStart(2,"0");

    await sleep(1000);

  }

  // ======================
  // MSN LOOP
  // ======================

  for(
    let i=0;
    i<msnTarget;
    i++
  ){

    if(stopProcess){

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

      return;

    }

    const link =
      msnLinks[
        Math.floor(
          Math.random() *
          msnLinks.length
        )
      ];

    writeLog(
      "MEMBUKA MSN NEWS",
      "#111"
    );

    botWindow.location.href =
      link;

    await progress(searchDelay);

    writeLog(
      "KEMBALI KE MENU BOT",
      "blue"
    );

    done++;

    document.getElementById(
      "counter"
    ).innerText =
      done
      .toString()
      .padStart(2,"0");

    await sleep(1000);

  }

  // ======================
  // CLOSE POPUP
  // ======================

  if(botWindow){

    botWindow.close();

  }

  // ======================
  // DONE
  // ======================

  writeLog(
    "BOT TELAH SELESAI",
    "green"
  );

  alert(
    "BOT TELAH SELESAI DIGUNAKAN"
  );

}

// ======================
// START BUTTON
// ======================

document
  .getElementById(
    "start-btn"
  )
  .addEventListener(
    "click",
    startBot
  );

// ======================
// STOP BUTTON
// ======================

document
  .getElementById(
    "stop-btn"
  )
  .addEventListener(
    "click",
    () => {

      stopProcess = true;

      if(botWindow){

        botWindow.close();

      }

      writeLog(
        "STOP BUTTON DITEKAN",
        "red"
      );

    }
  );

</script>

</body>
</html>
