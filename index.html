<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUSHET EKONOMI - Midnight Protocol</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>BUSHET EKONOMI</h1>
        <p class="subtitle">MIDNIGHT PROTOCOL</p>
      </div>
      <div class="settings-icon">⚙️</div>
    </header>
    <div class="divider"></div>

    <!-- ENGINE MSN -->
    <div class="engine">
      <div class="engine-header">
        <h2>ENGINE MSN</h2>
        <label class="switch">
          <input type="checkbox" id="toggle-msn" checked>
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="input-group">
        <label>TARGET BERITA MSN</label>
        <input type="text" id="query-msn" value="indonesia" placeholder="Topik berita: politik, teknologi...">
      </div>
      
      <div class="input-group">
        <label>SITUS BERITA TAMBAHAN</label>
        <input type="text" id="situs-msn" value="kompas.com, detik.com, tempo.co" placeholder="pisahkan dengan koma">
        <small>Misal: cnnindonesia.com, liputan6.com</small>
      </div>
      
      <div class="status">READY</div>
      <div class="counter"><span id="count-msn">00</span> / <span id="total-msn">10</span></div>
      <div class="progress-bar"><div class="progress" id="prog-msn"></div></div>
    </div>

    <!-- ENGINE BING -->
    <div class="engine">
      <div class="engine-header">
        <h2>ENGINE BING</h2>
        <label class="switch">
          <input type="checkbox" id="toggle-bing" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="input-group">
        <label>TARGET CARI WEB</label>
        <input type="text" id="query-bing" value="microsoft" placeholder="Kata kunci pencarian web...">
      </div>

      <div class="input-group">
        <label>FILTER DOMAIN TERTENTU</label>
        <input type="text" id="situs-bing" placeholder="Opsional: github.com, stackoverflow.com">
        <small>Kosongkan untuk cari di semua web</small>
      </div>

      <div class="status" id="status-bing">STANDBY</div>
      <div class="counter"><span id="count-bing">00</span> / <span id="total-bing">20</span></div>
      <div class="progress-bar"><div class="progress" id="prog-bing"></div></div>
    </div>

    <button class="eksekusi" onclick="mulaiOperasi()">EKSEKUSI OPERASI</button>

    <div id="hasil"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
