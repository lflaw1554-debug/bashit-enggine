<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEARCH & MSN AUTO BOT</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  min-height:100vh;

  background:
  linear-gradient(
    180deg,
    #ffb6d9,
    #ffffff,
    #1e3a8a
  );
}

.card{
  background:rgba(255,255,255,0.92);

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.12);
}

.input{
  width:100%;

  padding:12px;

  border-radius:14px;

  border:1px solid #ddd;

  margin-top:8px;
}

.btn{
  width:100%;

  padding:14px;

  border:none;

  border-radius:16px;

  font-weight:bold;

  transition:0.2s;
}

.btn:hover{
  transform:scale(1.02);
}

.progress{
  width:100%;

  height:12px;

  background:#ddd;

  border-radius:999px;

  overflow:hidden;
}

.progress-fill{
  width:0%;

  height:100%;

  background:#2563eb;

  transition:0.2s;
}

.log-box{
  height:250px;

  overflow:auto;

  background:#f5f5f5;

  border-radius:16px;

  padding:15px;

  font-size:13px;
}

.counter{
  font-size:50px;

  font-weight:900;

  text-align:center;
}

</style>
</head>

<body class="p-4 flex justify-center">

<div class="w-full max-w-md space-y-5">

  <!-- HEADER -->

  <div>

    <h1 class="text-3xl font-black">
      SEARCH AUTO BOT
    </h1>

    <p class="text-sm text-gray-700">
      Search + MSN Activity Simulator
    </p>

  </div>

  <!-- SEARCH -->

  <div class="card space-y-4">

    <h2 class="font-bold text-lg">
      CUSTOM SEARCH QUERY
    </h2>

    <div>

      <label>
        Jumlah Search
      </label>

      <input
        type="number"
        id="search-count"
        value="5"
        class="input"
      >

    </div>

    <div>

      <label>
        Durasi per Search (detik)
      </label>

      <input
        type="number"
        id="search-delay"
        value="5"
        class="input"
      >

    </div>

    <div>

      <label>
        Query Search
      </label>

      <textarea
        id="query-box"
        class="input h-40"
      >berita teknologi
wisata indonesia
cuaca hari ini
tutorial javascript
resep makanan</textarea>

    </div>

  </div>

  <!-- MSN -->

  <div class="card space-y-4">

    <h2 class="font-bold text-lg">
      CUSTOM MSN LINK
    </h2>

    <div>

      <label>
        Jumlah MSN Visit
      </label>

      <input
        type="number"
        id="msn-count"
        value="3"
        class="input"
      >

    </div>

    <div>

      <label>
        Durasi MSN (detik)
      </label>

      <input
        type="number"
        id="msn-delay"
        value="5"
        class="input"
      >

    </div>

    <div>

      <label>
        Link MSN
      </label>

      <textarea
        id="msn-box"
        class="input h-40"
      >https://www.msn.com/en-gb/news
https://www.msn.com/en-gb/money
https://www.msn.com/en-gb/travel</textarea>

    </div>

  </div>

  <!-- BUTTON -->

  <div class="grid grid-cols-2 gap-4">

    <button
      id="start-btn"
      class="btn bg-blue-600 text-white"
    >
      START BOT
    </button>

    <button
      id="stop-btn"
      class="btn bg-red-500 text-white"
    >
      STOP BOT
    </button>

  </div>

  <!-- STATUS -->

  <div class="card space-y-4">

    <div
      id="counter"
      class="counter"
    >
      00
    </div>

    <div class="progress">

      <div
        id="progress-fill"
        class="progress-fill"
      ></div>

    </div>

  </div>

  <!-- ACTIVITY LOG -->

  <div class="card">

    <h2 class="font-bold text-lg mb-4">
      ACTIVITY LOG
    </h2>

    <div
      id="log-box"
      class="log-box"
    ></div>

  </div>

</div>

<script>

// ======================
// SYSTEM
// ======================

let stopProcess = false;

// ======================
// LOG
// ======================

function writeLog(msg,color="#333"){

  const log =
    document.getElementById(
      "log-box"
    );

  const time =
    new Date().toLocaleTimeString();

  log.innerHTML += `
    <div style="color:${color}">
      [${time}] ${msg}
    </div>
  `;

  log.scrollTop =
    log.scrollHeight;

}

// ======================
// SLEEP
// ======================

function sleep(ms){

  return new Promise(
    r => setTimeout(r,ms)
  );

}

// ======================
// PROGRESS
// ======================

async function runProgress(sec){

  const fill =
    document.getElementById(
      "progress-fill"
    );

  fill.style.width = "0%";

  for(let i=0;i<=100;i++){

    if(stopProcess) return;

    fill.style.width =
      i + "%";

    await sleep(sec * 10);

  }

}

// ======================
// START BOT
// ======================

async function startBot(){

  stopProcess = false;

  writeLog(
    "BOT DIMULAI",
    "green"
  );

  const queries =
    document
      .getElementById(
        "query-box"
      )
      .value
      .split("\n")
      .map(v => v.trim())
      .filter(v => v);

  const msnLinks =
    document
      .getElementById(
        "msn-box"
      )
      .value
      .split("\n")
      .map(v => v.trim())
      .filter(v => v);

  const searchCount =
    parseInt(
      document.getElementById(
        "search-count"
      ).value
    );

  const searchDelay =
    parseInt(
      document.getElementById(
        "search-delay"
      ).value
    );

  const msnCount =
    parseInt(
      document.getElementById(
        "msn-count"
      ).value
    );

  const msnDelay =
    parseInt(
      document.getElementById(
        "msn-delay"
      ).value
    );

  let done = 0;

  // ======================
  // SEARCH LOOP
  // ======================

  for(let i=0;i<searchCount;i++){

    if(stopProcess){

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

      return;

    }

    const q =
      queries[
        Math.floor(
          Math.random() *
          queries.length
        )
      ];

    writeLog(
      `MEMBUKA SEARCH: ${q}`,
      "#111"
    );

    window.open(
      "https://www.bing.com/search?q=" +
      encodeURIComponent(q),
      "_blank"
    );

    await runProgress(searchDelay);

    done++;

    document.getElementById(
      "counter"
    ).innerText =
      done
      .toString()
      .padStart(2,"0");

    writeLog(
      `SELESAI SEARCH: ${q}`,
      "blue"
    );

    await sleep(1000);

  }

  // ======================
  // MSN LOOP
  // ======================

  for(let i=0;i<msnCount;i++){

    if(stopProcess){

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

      return;

    }

    const link =
      msnLinks[
        Math.floor(
          Math.random() *
          msnLinks.length
        )
      ];

    writeLog(
      `MEMBUKA MSN`,
      "#111"
    );

    window.open(
      link,
      "_blank"
    );

    await runProgress(msnDelay);

    done++;

    document.getElementById(
      "counter"
    ).innerText =
      done
      .toString()
      .padStart(2,"0");

    writeLog(
      `SELESAI MSN`,
      "blue"
    );

    await sleep(1000);

  }

  // ======================
  // DONE
  // ======================

  writeLog(
    "SEMUA AKTIVITAS SELESAI",
    "green"
  );

  alert(
    "BOT TELAH SELESAI DIGUNAKAN"
  );

}

// ======================
// BUTTON
// ======================

document
  .getElementById(
    "start-btn"
  )
  .addEventListener(
    "click",
    startBot
  );

document
  .getElementById(
    "stop-btn"
  )
  .addEventListener(
    "click",
    () => {

      stopProcess = true;

      writeLog(
        "STOP BUTTON DITEKAN",
        "red"
      );

    }
  );

</script>

</body>
</html>
