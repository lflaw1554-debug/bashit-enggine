<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Demo</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="p-4 flex justify-center">

<div class="w-full max-w-md">

  <!-- HEADER -->

  <div class="mb-6">

    <h1 class="text-3xl font-black">
      DEMO DASHBOARD
    </h1>

    <p class="text-sm text-gray-600">
      Search + MSN Viewer
    </p>

  </div>

  <!-- SEARCH -->

  <div class="card">

    <h2 class="title">
      SEARCH ENGINE
    </h2>

    <input
      type="number"
      id="search-target"
      value="20"
      class="input"
    >

    <textarea
      id="query-box"
      class="input h-40"
    >resep sate
abdullah
akhmad sodik
muhammad
kajian ust syafiq
alamussunah
laptop gaming
bunga bugenfil
tanaman yang beracun
tablet gaming
harga pajero
iphone 18
resep soto solo
tembok ratapan solo
prabowo
penyanyi terkenal jawa tengah
lawang sewu
wayang golek
oppo flip
ramayana</textarea>

  </div>

  <!-- MSN -->

  <div class="card">

    <h2 class="title">
      MSN NEWS
    </h2>

    <input
      type="number"
      id="msn-target"
      value="10"
      class="input"
    >

  </div>

  <!-- BUTTON -->

  <button
    id="start-btn"
    class="btn-start"
  >
    START
  </button>

  <!-- STATUS -->

  <div class="card">

    <div
      id="counter"
      class="counter"
    >
      00
    </div>

    <div class="progress">

      <div
        id="progress-bar"
        class="progress-bar"
      ></div>

    </div>

  </div>

  <!-- LOG -->

  <div class="card">

    <div
      id="log-box"
      class="log-box"
    ></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
