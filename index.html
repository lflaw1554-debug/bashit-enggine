<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bing Search + MSN News</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Bing Search</h1>
      <p>Cari Berita MSN & Web pake Bing API</p>
    </header>
    
    <div class="rewards-box">
      <h3>Microsoft Rewards</h3>
      <p>Pantau poin kamu manual biar aman</p>
      <a href="https://rewards.bing.com" target="_blank" class="btn-rewards">Buka Dashboard Rewards</a>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="gantiTab('berita')">📰 Berita MSN</button>
      <button class="tab-btn" onclick="gantiTab('web')">🌐 Pencarian Web</button>
    </div>

    <div class="search-box">
      <input type="text" id="keyword" placeholder="Ketik kata kunci..." value="indonesia">
      <button onclick="cari()">Cari</button>
    </div>
    
    <div id="loading" style="display:none;">
      <div class="spinner"></div>
      <p>Sedang mencari...</p>
    </div>
    
    <div id="hasil"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
