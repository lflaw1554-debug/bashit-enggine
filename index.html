        <div class="card-title">ENGINE MSN</div>

        <input type="number" class="input-value" id="targetMsn" value="10" min="1">

          <input type="number" class="input-value" id="minDelayMsn" value="8" min="1">

        <div class="input-group">

          <input type="number" class="input-value" id="maxDelayMsn" value="12" min="1">

      </div>
      <div class="status ready" id="statusMsn">READY</div>
      <div class="counter"><span id="currentMsn">00</span> / <span id="totalMsn">10</span></div>

    <div class="card">

        <div class="input-group">
          <div class="input-label">MIN DELAY</div>
          <input type="number" class="input-value" id="minDelayBing" value="8" min="1">
        </div>
        <div class="input-group">
          <div class="input-label">MAX DELAY</div>
          <input type="number" class="input-value" id="maxDelayBing" value="12" min="1">
        </div>
      </div>
      <div class="status" id="statusBing">STANDBY</div>
      <div class="counter"><span id="currentBing">00</span> / <span id="totalBing">20</span></div>
    </div>

    <button class="btn-execute" id="executeBtn">EKSEKUSI OPERASI</button>
  </div>
