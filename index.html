<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEARCH + MSN DASHBOARD</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:
  linear-gradient(
    180deg,
    #ffc0cb,
    #ffffff,
    #1e3a8a
  );

  min-height:100vh;
}

.card{
  background:rgba(255,255,255,0.9);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:15px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-top:10px;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:15px;
}

.start{
  background:#2563eb;
  color:white;
}

.stop{
  background:#ef4444;
  color:white;
}

.log-box{
  height:220px;
  overflow:auto;
  background:#f5f5f5;
  border-radius:12px;
  padding:15px;
  font-size:14px;
}

.progress{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
  margin-top:20px;
}

.progress-bar{
  width:0%;
  height:100%;
  background:#2563eb;
}

.counter{
  text-align:center;
  font-size:42px;
  font-weight:bold;
}

iframe{
  width:100%;
  height:400px;
  border:none;
  border-radius:12px;
  background:white;
}

</style>
</head>

<body class="p-4 flex justify-center">

<div class="w-full max-w-md">

  <!-- HEADER -->

  <div class="mb-6">

    <h1 class="text-3xl font-black">
      DEMO DASHBOARD
    </h1>

    <p class="text-sm text-gray-700">
      Search + MSN Viewer
    </p>

  </div>

  <!-- SEARCH -->

  <div class="card">

    <div class="title">
      SEARCH ENGINE
    </div>

    <label>Jumlah Search</label>

    <input
      type="number"
      id="search-target"
      value="3"
      class="input"
    >

    <label>Durasi Search (detik)</label>

    <input
      type="number"
      id="search-delay"
      value="6"
      class="input"
    >

    <label>Query Search</label>

    <textarea
      id="query-box"
      class="input"
      style="height:140px"
    >resep sate
abdullah
akhmad sodik
muhammad
kajian ust syafiq
alamussunah
laptop gaming
bunga bugenfil
tanaman yang beracun
tablet gaming
harga pajero
iphone 18
resep soto solo
tembok ratapan solo
prabowo
penyanyi terkenal jawa tengah
lawang sewu
wayang golek
oppo flip
ramayana</textarea>

  </div>

  <!-- MSN -->

  <div class="card">

    <div class="title">
      MSN NEWS
    </div>

    <label>Jumlah MSN</label>

    <input
      type="number"
      id="msn-target"
      value="2"
      class="input"
    >

  </div>

  <!-- BUTTON -->

  <button
    id="start-btn"
    class="btn start"
  >
    START BOT
  </button>

  <button
    id="stop-btn"
    class="btn stop"
  >
    STOP BOT
  </button>

  <!-- VIEWER -->

  <div class="card">

    <div class="title">
      VIEWER
    </div>

    <iframe
      id="viewer-frame"
      src=""
    ></iframe>

  </div>

  <!-- STATUS -->

  <div class="card">

    <div
      id="counter"
      class="counter"
    >
      00
    </div>

    <div class="progress">

      <div
        id="progress-bar"
        class="progress-bar"
      ></div>

    </div>

  </div>

  <!-- LOG -->

  <div class="card">

    <div class="title">
      ACTIVITY LOG
    </div>

    <div
      id="log-box"
      class="log-box"
    ></div>

  </div>

</div>

<script>

// ======================
// DATA
// ======================

const msnLinks = [

  "https://www.msn.com/en-gb/travel/news/holidaymakers-told-to-arrive-four-hours-early-or-miss-flights-in-ees-chaos/ss-AA22lkS6?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/news/uknews/starmer-under-threat-over-trojan-horse-plot-to-smuggle-rival-back-to-replace-him/ar-AA22wWGb?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/entertainment/tv/badenoch-starmer-s-finished-and-polanski-s-a-joke-we-re-the-only-serious-choice/ar-AA22xk97?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/entertainment/news/king-charles-allegedly-slams-top-dog-authority-prince-william-told-to-know-his-place/ar-AA22wXBc?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/travel/news/coventry-airport-to-close-after-90-years-with-all-flights-scrapped-within-weeks/ar-AA22wiSz?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/money/other/aldi-and-lidl-rule-could-be-forced-to-change-as-uk-supermarkets-demand-crackdown/ar-AA22wfrY?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/news/uknews/starmer-s-last-ditch-plea-as-labour-braces-for-local-election-disaster/ar-AA22yUxG?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/travel/news/uk-staycation-demand-rises-as-airlines-told-they-can-cancel-flights/ss-AA22qn5L?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/lifestyle/family-relationships/report-queen-camilla-s-ex-husband-now-right-hand-man-to-princess-anne/ss-AA22i4Ea?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/foodanddrink/other/binman-s-rule-to-anyone-recycling-tins-and-jars-with-labels-left-on/ar-AA1X2DRu?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/money/other/britain-sleepwalking-towards-jobless-generation-warn-retailers/ar-AA22AqRQ?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/news/uknews/keir-starmer-to-use-eu-reset-to-stave-off-leadership-challenge/ar-AA22zFsq?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/money/technology/all-gmail-users-urged-to-check-one-setting-now-as-important-warning-issued/ar-AA22ueZv?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",
  
  "https://www.msn.com/en-gb/news/world/sky-news-halted-for-ultimate-humiliation-breaking-news-alert-for-donald-trump/ar-AA22vBj6?cvid=69fc548eb56e4d098c433a606fdef345&ocid=sappandhp",

];

let stopProcess = false;

// ======================
// LOG
// ======================

function writeLog(msg,color="#222"){

  const log =
    document.getElementById(
      "log-box"
    );

  const time =
    new Date().toLocaleTimeString();

  log.innerHTML += `
    <div style="color:${color}">
      [${time}] ${msg}
    </div>
  `;

  log.scrollTop =
    log.scrollHeight;

}

// ======================
// SLEEP
// ======================

function sleep(ms){

  return new Promise(
    r => setTimeout(r,ms)
  );

}

// ======================
// PROGRESS
// ======================

async function progress(sec){

  const bar =
    document.getElementById(
      "progress-bar"
    );

  for(let i=0;i<=100;i++){

    if(stopProcess) return;

    bar.style.width =
      i + "%";

    await sleep(sec * 10);

  }

  bar.style.width = "0%";

}

// ======================
// START BOT
// ======================

async function startBot(){

  stopProcess = false;

  writeLog(
    "BOT DIMULAI",
    "green"
  );

  const frame =
    document.getElementById(
      "viewer-frame"
    );

  const searchTarget =
    parseInt(
      document.getElementById(
        "search-target"
      ).value
    );

  const searchDelay =
    parseInt(
      document.getElementById(
        "search-delay"
      ).value
    );

  const msnTarget =
    parseInt(
      document.getElementById(
        "msn-target"
      ).value
    );

  const queries =
    document
      .getElementById(
        "query-box"
      )
      .value
      .split("\n")
      .map(v => v.trim())
      .filter(v => v);

  let done = 0;

  // ======================
  // SEARCH LOOP
  // ======================

  for(
    let i=0;
    i<searchTarget;
    i++
  ){

    if(stopProcess){

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

      return;

    }

    const q =
      queries[
        Math.floor(
          Math.random() *
          queries.length
        )
      ];

    writeLog(
      `SEARCH: ${q}`,
      "#111"
    );

    frame.src =
      "https://www.bing.com/search?q=" +
      encodeURIComponent(q);

    await progress(searchDelay);

    writeLog(
      "KEMBALI KE MENU BOT",
      "blue"
    );

    done++;

    document.getElementById(
      "counter"
    ).innerText =
      done
      .toString()
      .padStart(2,"0");

    await sleep(1000);

  }

  // ======================
  // MSN LOOP
  // ======================

  for(
    let i=0;
    i<msnTarget;
    i++
  ){

    if(stopProcess){

      writeLog(
        "BOT DIHENTIKAN",
        "red"
      );

      return;

    }

    const link =
      msnLinks[
        Math.floor(
          Math.random() *
          msnLinks.length
        )
      ];

    writeLog(
      "MEMBUKA MSN NEWS",
      "#111"
    );

    frame.src = link;

    await progress(searchDelay);

    writeLog(
      "KEMBALI KE MENU BOT",
      "blue"
    );

    done++;

    document.getElementById(
      "counter"
    ).innerText =
      done
      .toString()
      .padStart(2,"0");

    await sleep(1000);

  }

  // ======================
  // SELESAI
  // ======================

  writeLog(
    "BOT TELAH SELESAI DIGUNAKAN",
    "green"
  );

  alert(
    "BOT TELAH SELESAI DIGUNAKAN"
  );

}

// ======================
// START BUTTON
// ======================

document
  .getElementById(
    "start-btn"
  )
  .addEventListener(
    "click",
    startBot
  );

// ======================
// STOP BUTTON
// ======================

document
  .getElementById(
    "stop-btn"
  )
  .addEventListener(
    "click",
    () => {

      stopProcess = true;

      writeLog(
        "STOP BUTTON DITEKAN",
        "red"
      );

    }
  );

</script>

</body>
</html>
