<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Elite Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>ELITE ENGINE</h1>

  <!-- BING -->
  <div class="card">
    <h2>ENGINE BING</h2>

    <label class="switch">
      <input type="checkbox" id="engineToggle" checked>
      <span class="slider"></span>
    </label>

    <input type="number" id="target" value="10">
    <input type="number" id="minDelay" value="8">
    <input type="number" id="maxDelay" value="11">

    <p id="progress">0 / 0</p>
  </div>

  <!-- NEWS -->
  <div class="card">
    <h2>ENGINE NEWS</h2>

    <label class="switch">
      <input type="checkbox" id="newsToggle" checked>
      <span class="slider"></span>
    </label>

    <input type="number" id="newsTarget" value="20">
    <input type="number" id="newsMinDelay" value="8">
    <input type="number" id="newsMaxDelay" value="11">

    <p id="newsProgress">0 / 0</p>
  </div>

  <button onclick="start()">START</button>
  <button onclick="stop()">STOP</button>
</div>

<script src="script.js"></script>
</body>
</html>
